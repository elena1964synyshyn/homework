  <main>
    <form class="form">
      <label for="login">Логін:</label>
      <input class="input" id="login" type="text" placeholder="login" autocomplete="username">
      <label for="password">Пароль:</label>
      <input class="input" id="password" type="password" placeholder="password" autocomplete="current-password">
      <button class="btnSub" type="submit">Реєстрація</button>
    </form>
  </main>








  <script>
    // Відключаємо кешування для всіх ресурсів
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
        }
      });
    }
  </script>
